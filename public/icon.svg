<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="parchment" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f4e4c1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4b896;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Scroll Background -->
  <path d="M 10 8 Q 8 8 8 10 L 8 54 Q 8 56 10 56 L 54 56 Q 56 56 56 54 L 56 10 Q 56 8 54 8 Z" 
        fill="url(#parchment)" stroke="#8b6f47" stroke-width="1.5"/>
  
  <!-- Top Scroll Rod -->
  <rect x="6" y="5" width="52" height="4" rx="2" fill="#6b4423" />
  <rect x="8" y="6" width="48" height="2" rx="1" fill="#8b5a3c" />
  
  <!-- Bottom Scroll Rod -->
  <rect x="6" y="55" width="52" height="4" rx="2" fill="#6b4423" />
  <rect x="8" y="56" width="48" height="2" rx="1" fill="#8b5a3c" />
  
  <!-- Decorative Writing Lines -->
  <line x1="16" y1="20" x2="48" y2="20" stroke="#8b6f47" stroke-width="1.5" opacity="0.5"/>
  <line x1="16" y1="28" x2="44" y2="28" stroke="#8b6f47" stroke-width="1.5" opacity="0.5"/>
  <line x1="16" y1="36" x2="48" y2="36" stroke="#8b6f47" stroke-width="1.5" opacity="0.5"/>
  <line x1="16" y1="44" x2="40" y2="44" stroke="#8b6f47" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Ornate Letter 'R' for Realm -->
  <text x="32" y="38" font-family="serif" font-size="24" font-weight="bold" 
        text-anchor="middle" fill="#8b4513" opacity="0.8">R</text>
</svg>

